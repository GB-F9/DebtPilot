<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LoanPilot">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjMGEwYTBmIi8+PHRleHQgeD0iOTAiIHk9IjExNSIgZm9udC1zaXplPSI5MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iI2Y1YzUxOCI+4oKxPC90ZXh0Pjwvc3ZnPg==">
<title>LoanPilot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg-card: #13131a;
    --bg-card-hover: #1a1a24;
    --bg-elevated: #1e1e2a;
    --border: rgba(255,255,255,0.06);
    --border-active: rgba(245,197,24,0.3);
    --text-primary: #f0f0f5;
    --text-secondary: #8a8a9a;
    --text-muted: #55556a;
    --accent: #f5c518;
    --accent-dim: rgba(245,197,24,0.15);
    --accent-glow: rgba(245,197,24,0.08);
    --danger: #ff4757;
    --danger-dim: rgba(255,71,87,0.15);
    --danger-glow: rgba(255,71,87,0.06);
    --success: #2ed573;
    --success-dim: rgba(46,213,115,0.15);
    --warning: #ffa502;
    --warning-dim: rgba(255,165,2,0.15);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.15);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(245,197,24,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(59,130,246,0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    padding: calc(var(--safe-top) + 12px) 16px calc(var(--safe-bottom) + 90px);
    max-width: 500px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding: 0 2px;
  }
  .header-left h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text-primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-left p {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
  }
  .header-btn {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 18px;
  }
  .header-btn:active { transform: scale(0.92); background: var(--bg-elevated); }

  /* ── Summary Strip ── */
  .summary-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    text-align: center;
  }
  .summary-card.highlight {
    background: linear-gradient(135deg, var(--accent-dim), var(--accent-glow));
    border-color: var(--border-active);
  }
  .summary-card .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .summary-card .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .summary-card.highlight .value {
    color: var(--accent);
  }
  .summary-card .sub {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  /* ── Next Payment Alert ── */
  .next-payment {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .next-payment::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .next-payment.overdue::before { background: var(--danger); }
  .next-payment .np-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .next-payment .np-icon.upcoming { background: var(--accent-dim); }
  .next-payment .np-icon.overdue { background: var(--danger-dim); }
  .next-payment .np-info { flex: 1; min-width: 0; }
  .next-payment .np-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .next-payment .np-creditor {
    font-size: 15px;
    font-weight: 600;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .next-payment .np-detail {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .next-payment .np-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    flex-shrink: 0;
  }
  .next-payment.overdue .np-amount { color: var(--danger); }

  /* ── Section Header ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding: 0 2px;
  }
  .section-header h2 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .section-header .count {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg-elevated);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* ── Creditor Tile ── */
  .creditor-tile {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: all 0.3s ease;
    animation: fadeUp 0.4s ease both;
  }
  .creditor-tile.overdue { border-color: rgba(255,71,87,0.2); }
  .creditor-tile.due-soon { border-color: rgba(255,165,2,0.2); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tile-header {
    padding: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    -webkit-user-select: none;
    user-select: none;
  }
  .tile-header:active { background: var(--bg-card-hover); }

  .tile-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    font-weight: 700;
  }

  .tile-info { flex: 1; min-width: 0; }
  .tile-name {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tile-account {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .tile-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .tile-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-overdue {
    background: var(--danger-dim);
    color: var(--danger);
  }
  .badge-due-soon {
    background: var(--warning-dim);
    color: var(--warning);
  }
  .badge-ok {
    background: var(--success-dim);
    color: var(--success);
  }
  .badge-paid {
    background: var(--blue-dim);
    color: var(--blue);
  }

  .tile-right {
    text-align: right;
    flex-shrink: 0;
  }
  .tile-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
  }
  .tile-total-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .tile-chevron {
    color: var(--text-muted);
    font-size: 14px;
    transition: transform 0.3s ease;
    margin-left: 4px;
  }
  .creditor-tile.expanded .tile-chevron {
    transform: rotate(180deg);
  }

  /* ── Amortization Breakdown Strip ── */
  .amort-strip {
    padding: 0 16px 14px;
    border-bottom: 1px solid var(--border);
  }
  .amort-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
  }
  .amort-row .ar-label {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .amort-row .ar-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .amort-row .ar-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .amort-divider {
    height: 1px;
    background: var(--border);
    margin: 6px 0;
  }
  .amort-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0 0;
  }
  .amort-total .at-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .amort-total .at-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
  }

  /* ── Loan Cards inside tile ── */
  .tile-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .creditor-tile.expanded .tile-body {
    max-height: 2000px;
  }

  .loan-card {
    margin: 0 12px 12px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    padding: 14px;
    border: 1px solid var(--border);
  }
  .loan-card:first-child { margin-top: 4px; }

  .loan-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .loan-label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .loan-principal {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    margin-top: 2px;
  }
  .loan-due-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .loan-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .loan-field .f-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 2px;
  }
  .loan-field .f-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .loan-field .f-value.mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  /* Progress bar */
  .loan-progress {
    margin-top: 2px;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 6px;
  }
  .progress-header .p-label { color: var(--text-muted); }
  .progress-header .p-value { 
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    background: linear-gradient(90deg, var(--accent), #f0a500);
  }
  .progress-fill.danger {
    background: linear-gradient(90deg, var(--danger), #ff6b81);
  }
  .progress-fill.complete {
    background: linear-gradient(90deg, var(--success), #7bed9f);
  }

  /* ── Tile summary footer ── */
  .tile-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }
  .tile-footer .tf-label { color: var(--text-muted); }
  .tile-footer .tf-value {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--accent);
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 10px 0 calc(var(--safe-bottom) + 6px);
    z-index: 100;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 4px 16px;
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item .nav-icon { font-size: 22px; }
  .nav-item:active { transform: scale(0.9); }

  /* ── Views ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── Calendar View ── */
  .calendar-month {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .cal-month-name {
    font-size: 17px;
    font-weight: 600;
  }
  .cal-nav { display: flex; gap: 8px; }
  .cal-nav button {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    text-align: center;
  }
  .cal-day-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 4px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    position: relative;
    cursor: default;
  }
  .cal-day.empty { visibility: hidden; }
  .cal-day.today {
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 700;
  }
  .cal-day.has-due {
    background: var(--bg-elevated);
    cursor: pointer;
  }
  .cal-day.has-due::after {
    content: '';
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    position: absolute;
    bottom: 4px;
  }
  .cal-day.has-overdue::after { background: var(--danger); }

  .cal-events {
    margin-top: 12px;
  }
  .cal-event {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-elevated);
    border-radius: var(--radius-xs);
    margin-bottom: 6px;
  }
  .cal-event-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cal-event-info { flex: 1; }
  .cal-event-name {
    font-size: 13px;
    font-weight: 500;
  }
  .cal-event-sub {
    font-size: 11px;
    color: var(--text-muted);
  }
  .cal-event-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
  }

  /* ── Stats View ── */
  .stat-section {
    margin-bottom: 20px;
  }
  .stat-section h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 12px;
    padding: 0 2px;
  }
  .stat-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .stat-bar-label {
    font-size: 12px;
    color: var(--text-secondary);
    width: 100px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stat-bar-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 4px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s ease;
  }
  .stat-bar-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    width: 80px;
    text-align: right;
    flex-shrink: 0;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }
  .stat-card .sc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
  }
  .stat-card .sc-row:not(:last-child) {
    border-bottom: 1px solid var(--border);
  }
  .stat-card .sc-label {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .stat-card .sc-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
  }

  /* ── Settings View ── */
  .settings-group {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .settings-item {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.15s;
  }
  .settings-item:active { background: var(--bg-card-hover); }
  .settings-item:not(:last-child) { border-bottom: 1px solid var(--border); }
  .settings-item .si-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .settings-item .si-icon {
    font-size: 18px;
    width: 32px;
    text-align: center;
  }
  .settings-item .si-label {
    font-size: 14px;
    font-weight: 500;
  }
  .settings-item .si-arrow {
    color: var(--text-muted);
    font-size: 14px;
  }
  .settings-note {
    font-size: 12px;
    color: var(--text-muted);
    padding: 8px 16px 0;
    line-height: 1.5;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.show {
    display: flex;
    animation: fadeIn 0.2s ease;
  }
  .modal {
    background: var(--bg-card);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 20px 16px calc(var(--safe-bottom) + 16px);
    animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal h3 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
  }

  /* ── Edit/Add Form ── */
  .form-group {
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    color: var(--text-primary);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-secondary {
    background: var(--bg-elevated);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    margin-top: 8px;
  }
  .btn-danger {
    background: var(--danger-dim);
    color: var(--danger);
    margin-top: 8px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: calc(var(--safe-top) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    z-index: 300;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ── Utility ── */
  .text-danger { color: var(--danger) !important; }
  .text-warning { color: var(--warning) !important; }
  .text-success { color: var(--success) !important; }
  .text-accent { color: var(--accent) !important; }
  .text-muted { color: var(--text-muted) !important; }
  .mt-8 { margin-top: 8px; }
  .mb-16 { margin-bottom: 16px; }
  .hidden { display: none !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>

        <span class="si-arrow">›</span>

    <p class="settings-note">All data is stored locally on your device. Export regularly to keep a backup. No data is sent to any server.</p>

<script>
// ═══════════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════════
const STORAGE_KEY = 'loanpilot_data';

const DEFAULT_DATA = {
  creditors: [
    {
      id: 'ewb',

        { id: 'ewb3', label: 'Loan 3', principal: 49990, availDate: '2026-03-25', endDate: '2027-03-28', duration: 24, dueDay: 28, monthly: 2082.92, totalMonths: 24, monthsPaid: 14 },

    },
    {

      account: '0211-0100-0030-1097',

      loans: [
        { id: 'ubp1', label: 'Loan 1', principal: null, availDate: '2024-07-02', endDate: '2027-07-02', duration: 36, dueDay: 2, monthly: 9939.96, totalMonths: 36, monthsPaid: 18 },
        { id: 'ubp2', label: 'Loan 2', principal: null, availDate: '2024-10-02', endDate: '2027-10-02', duration: 36, dueDay: 2, monthly: 3975.98, totalMonths: 36, monthsPaid: 21 },
        { id: 'ubp3', label: 'Loan 3', principal: null, availDate: '2025-09-02', endDate: '2028-09-02', duration: 36, dueDay: 2, monthly: 11092.99, totalMonths: 36, monthsPaid: 32 },
      ]
    },
    {
      id: 'hc',
      name: 'Home Credit',
      account: '4509-5603-22 (Extreme)',
      icon: '💳',
      color: '#ff6348',
      loans: [
        { id: 'hc1', label: 'Extreme Loan', principal: 19095, availDate: '2025-12-12', endDate: '2026-12-12', duration: 12, dueDay: 12, monthly: 1689, totalMonths: 12, monthsPaid: 11 },
      ]
    },
    {
      id: 'tonik',
      name: 'Tonik',
      account: '6083-4215-0000-08 (Extreme)',
      icon: '📱',
      color: '#a55eea',
      loans: [
        { id: 'ton1', label: 'Extreme Loan', principal: 19770, availDate: '2025-05-05', endDate: '2026-05-10', duration: 12, dueDay: 10, monthly: 1762.83, totalMonths: 12, monthsPaid: 4 },
      ]
    },
    {
      id: 'cimb',
      name: 'CIMB',
      account: '',
      icon: '🔴',
      color: '#ff4757',
      loans: [
        { id: 'cimb1', label: 'Personal Loan', principal: 29013.94, availDate: '', endDate: '', duration: null, dueDay: 1, monthly: 0, totalMonths: 0, monthsPaid: 0 },
      ]
    },
    {
      id: 'bl',
      name: 'Billease',
      account: '',
      icon: '📦',
      color: '#2ed573',
      loans: [
        { id: 'bl1', label: 'Loan 1', principal: 5000, availDate: '2025-09-21', endDate: '2026-04-01', duration: 12, dueDay: 30, monthly: 520, totalMonths: 12, monthsPaid: 6 },
        { id: 'bl2', label: 'Loan 2', principal: 15000, availDate: '2025-09-12', endDate: '2026-03-16', duration: 12, dueDay: 30, monthly: 1557, totalMonths: 12, monthsPaid: 5 },
      ]
    },
  ]
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function initData() {
  let data = loadData();
  if (!data) {
    data = DEFAULT_DATA;
    saveData(data);
  }
  return data;
}

let appData = initData();

// ═══════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════
const today = new Date();
today.setHours(0,0,0,0);

function formatCurrency(n) {
  if (n == null || isNaN(n)) return '₱0.00';
  return '₱' + Number(n).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getNextDueDate(dueDay) {
  const now = new Date();
  let due = new Date(now.getFullYear(), now.getMonth(), dueDay);
  // If due day already passed this month and it's not today, next month
  if (due < now && due.toDateString() !== now.toDateString()) {
    due.setMonth(due.getMonth() + 1);
  }
  return due;
}

function getDaysUntilDue(dueDay) {
  const next = getNextDueDate(dueDay);
  const diff = Math.ceil((next - today) / (1000 * 60 * 60 * 24));
  return diff;
}

function getDueStatus(dueDay, loan) {
  // If fully paid
  if (loan.totalMonths > 0 && loan.monthsPaid >= loan.totalMonths) return 'paid';
  const days = getDaysUntilDue(dueDay);
  if (days < 0) return 'overdue';
  if (days === 0) return 'due-today';
  if (days <= 5) return 'due-soon';
  return 'ok';
}

function getDueStatusLabel(status) {
  switch(status) {
    case 'overdue': return { text: 'OVERDUE', cls: 'badge-overdue' };
    case 'due-today': return { text: 'DUE TODAY', cls: 'badge-overdue' };
    case 'due-soon': return { text: 'DUE SOON', cls: 'badge-due-soon' };
    case 'paid': return { text: 'PAID OFF', cls: 'badge-paid' };
    default: return { text: 'ON TRACK', cls: 'badge-ok' };
  }
}

function getCreditorDueStatus(creditor) {
  let worst = 'ok';
  const priority = { 'paid': 0, 'ok': 1, 'due-soon': 2, 'due-today': 3, 'overdue': 4 };
  creditor.loans.forEach(l => {
    const s = getDueStatus(l.dueDay, l);
    if (priority[s] > priority[worst]) worst = s;
  });
  return worst;
}

function getCreditorNextDueDate(creditor) {
  let nearest = Infinity;
  creditor.loans.forEach(l => {
    if (l.totalMonths > 0 && l.monthsPaid >= l.totalMonths) return;
    const days = getDaysUntilDue(l.dueDay);
    if (days < nearest) nearest = days;
  });
  return nearest;
}

function sortCreditors(creditors) {
  return [...creditors].sort((a, b) => {
    const aDays = getCreditorNextDueDate(a);
    const bDays = getCreditorNextDueDate(b);
    return aDays - bDays;
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════
// RENDER: HOME
// ═══════════════════════════════════════════════════
function renderHome() {
  // Header date
  document.getElementById('header-date').textContent = today.toLocaleDateString('en-PH', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  // Summary
  let totalMonthly = 0, totalLoans = 0, activeCreditors = 0;
  appData.creditors.forEach(c => {
    let hasActive = false;
    c.loans.forEach(l => {
      if (l.totalMonths > 0 && l.monthsPaid >= l.totalMonths) return;
      totalMonthly += l.monthly || 0;
      totalLoans++;
      hasActive = true;
    });
    if (hasActive) activeCreditors++;
  });

  document.getElementById('summary-strip').innerHTML = `
    <div class="summary-card highlight">
      <div class="label">Monthly</div>
      <div class="value">${formatCurrency(totalMonthly)}</div>
      <div class="sub">total obligation</div>
    </div>
    <div class="summary-card">
      <div class="label">Active</div>
      <div class="value">${totalLoans}</div>
      <div class="sub">loan${totalLoans !== 1 ? 's' : ''}</div>
    </div>
    <div class="summary-card">
      <div class="label">Creditors</div>
      <div class="value">${activeCreditors}</div>
      <div class="sub">institution${activeCreditors !== 1 ? 's' : ''}</div>
    </div>
  `;

  // Next payment — aggregate all loans per creditor+dueDay
  const sorted = sortCreditors(appData.creditors);
  const paymentGroups = [];
  sorted.forEach(c => {
    const dueDayMap = {};
    c.loans.forEach(l => {
      if (l.totalMonths > 0 && l.monthsPaid >= l.totalMonths) return;
      if (!l.monthly) return;
      const key = l.dueDay;
      if (!dueDayMap[key]) dueDayMap[key] = { creditor: c.name, dueDay: l.dueDay, amount: 0, loans: [], days: getDaysUntilDue(l.dueDay) };
      dueDayMap[key].amount += l.monthly;
      dueDayMap[key].loans.push(l.label);
    });
    Object.values(dueDayMap).forEach(g => paymentGroups.push(g));
  });
  paymentGroups.sort((a, b) => a.days - b.days);
  const nextPayment = paymentGroups.length > 0 ? paymentGroups[0] : null;

  const npContainer = document.getElementById('next-payment-container');
  if (nextPayment) {
    const isOverdue = nextPayment.days < 0;
    const isDueToday = nextPayment.days === 0;
    let dueText = '';
    if (isOverdue) dueText = `${Math.abs(nextPayment.days)} day${Math.abs(nextPayment.days)>1?'s':''} overdue`;
    else if (isDueToday) dueText = 'Due today';
    else dueText = `Due in ${nextPayment.days} day${nextPayment.days>1?'s':''}`;

    const loanCount = nextPayment.loans.length;
    const loanDetail = loanCount > 1 ? `${loanCount} loans` : nextPayment.loans[0];

    npContainer.innerHTML = `
      <div class="next-payment ${isOverdue ? 'overdue' : ''}">
        <div class="np-icon ${isOverdue ? 'overdue' : 'upcoming'}">${isOverdue ? '⚠️' : '📌'}</div>
        <div class="np-info">
          <div class="np-title">${isOverdue ? 'Overdue Payment' : 'Next Payment'}</div>
          <div class="np-creditor">${nextPayment.creditor}</div>
          <div class="np-detail">${loanDetail} · ${dueText} · ${getOrdinal(nextPayment.dueDay)} of month</div>
        </div>
        <div class="np-amount">${formatCurrency(nextPayment.amount)}</div>
      </div>
    `;
  } else {
    npContainer.innerHTML = '';
  }

  // Creditor count
  document.getElementById('creditor-count').textContent = `${appData.creditors.length} total`;

  // Creditor list
  const list = document.getElementById('creditor-list');
  list.innerHTML = '';

  sorted.forEach((c, ci) => {
    const status = getCreditorDueStatus(c);
    const statusInfo = getDueStatusLabel(status);
    const totalMo = c.loans.reduce((s, l) => {
      if (l.totalMonths > 0 && l.monthsPaid >= l.totalMonths) return s;
      return s + (l.monthly || 0);
    }, 0);
    const tileClass = status === 'overdue' || status === 'due-today' ? 'overdue' : status === 'due-soon' ? 'due-soon' : '';

    let loansHTML = '';
    c.loans.forEach(l => {
      const ls = getDueStatus(l.dueDay, l);
      const lsi = getDueStatusLabel(ls);
      const remaining = l.totalMonths - l.monthsPaid;
      const pct = l.totalMonths > 0 ? Math.round((l.monthsPaid / l.totalMonths) * 100) : 0;
      const progressCls = pct >= 100 ? 'complete' : pct > 75 ? '' : '';
      const fillCls = ls === 'overdue' || ls === 'due-today' ? 'danger' : pct >= 100 ? 'complete' : '';

      loansHTML += `
        <div class="loan-card">
          <div class="loan-card-header">
            <div>
              <div class="loan-label">${l.label}</div>
              <div class="loan-principal">${l.principal ? formatCurrency(l.principal) : '—'}</div>
            </div>
            <span class="loan-due-badge ${lsi.cls}">${lsi.text}</span>
          </div>
          <div style="background:rgba(245,197,24,0.06);border:1px solid rgba(245,197,24,0.12);border-radius:8px;padding:10px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);font-weight:600;">Monthly Amortization</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--accent);">${formatCurrency(l.monthly)}</span>
          </div>
          <div class="loan-grid">
            <div class="loan-field">
              <div class="f-label">Availment</div>
              <div class="f-value">${formatDate(l.availDate)}</div>
            </div>
            <div class="loan-field">
              <div class="f-label">End Date</div>
              <div class="f-value">${formatDate(l.endDate)}</div>
            </div>
            <div class="loan-field">
              <div class="f-label">Due Day</div>
              <div class="f-value">${getOrdinal(l.dueDay)} of each month</div>
            </div>
            <div class="loan-field">
              <div class="f-label">Duration</div>
              <div class="f-value">${l.duration ? l.duration + ' months' : '—'}</div>
            </div>
            <div class="loan-field">
              <div class="f-label">Months Remaining</div>
              <div class="f-value ${remaining <= 3 && remaining > 0 ? 'text-success' : ''}">${l.totalMonths > 0 ? remaining + '/' + l.totalMonths + ' mos' : '—'}</div>
            </div>
            <div class="loan-field">
              <div class="f-label">Months Paid</div>
              <div class="f-value">${l.monthsPaid > 0 ? l.monthsPaid + ' mos' : '—'}</div>
            </div>
          </div>
          ${l.totalMonths > 0 ? `
          <div class="loan-progress">
            <div class="progress-header">
              <span class="p-label">Progress</span>
              <span class="p-value">${pct}% complete</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${fillCls}" style="width:${pct}%"></div>
            </div>
          </div>` : ''}
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn btn-secondary" style="padding:10px;font-size:12px;" onclick="editLoan('${c.id}','${l.id}')">✏️ Edit</button>
            ${l.totalMonths > 0 && l.monthsPaid < l.totalMonths ? `<button class="btn btn-primary" style="padding:10px;font-size:12px;flex:1;" onclick="recordPayment('${c.id}','${l.id}')">✓ Record Payment</button>` : ''}
          </div>
        </div>
      `;
    });

    // Build amortization breakdown strip
    const activeLoans = c.loans.filter(l => !(l.totalMonths > 0 && l.monthsPaid >= l.totalMonths));
    let amortBreakdownHTML = '';
    if (activeLoans.length > 0) {
      const rows = activeLoans.map(l => `
        <div class="amort-row">
          <span class="ar-label"><span class="ar-dot" style="background:${c.color}"></span>${l.label}</span>
          <span class="ar-amount">${formatCurrency(l.monthly)}</span>
        </div>
      `).join('');
      amortBreakdownHTML = `
        <div class="amort-strip">
          ${rows}
          ${activeLoans.length > 1 ? `
            <div class="amort-divider"></div>
            <div class="amort-total">
              <span class="at-label">Total Monthly Amortization</span>
              <span class="at-value">${formatCurrency(totalMo)}</span>
            </div>
          ` : ''}
        </div>
      `;
    }

    const tile = document.createElement('div');
    tile.className = `creditor-tile ${tileClass}`;
    tile.style.animationDelay = `${ci * 0.06}s`;
    tile.innerHTML = `
      <div class="tile-header" onclick="toggleTile(this)">
        <div class="tile-icon" style="background:${c.color}22;color:${c.color}">${c.icon}</div>
        <div class="tile-info">
          <div class="tile-name">${c.name}</div>
          ${c.account ? `<div class="tile-account">${c.account}</div>` : ''}
          <div class="tile-meta">
            <span class="tile-badge ${statusInfo.cls}">${statusInfo.text}</span>

function getOrdinal(n) {
  if (!n) return '—';
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function toggleTile(header) {
  const tile = header.closest('.creditor-tile');
  tile.classList.toggle('expanded');
}

// ═══════════════════════════════════════════════════
// RENDER: CALENDAR
// ═══════════════════════════════════════════════════
let calMonth = today.getMonth();
let calYear = today.getFullYear();

function renderCalendar() {
  const container = document.getElementById('calendar-container');

  // Build due map for this month
  const dueMap = {};
  appData.creditors.forEach(c => {
    c.loans.forEach(l => {
      if (l.totalMonths > 0 && l.monthsPaid >= l.totalMonths) return;
      if (!l.monthly) return;
      const day = l.dueDay;
      if (!dueMap[day]) dueMap[day] = [];
      dueMap[day].push({ creditor: c.name, label: l.label, amount: l.monthly, color: c.color, icon: c.icon });
    });
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const monthName = new Date(calYear, calMonth).toLocaleDateString('en-PH', { month: 'long', year: 'numeric' });

  let daysHTML = '';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    daysHTML += `<div class="cal-day-label">${d}</div>`;
  });
  for (let i = 0; i < firstDay; i++) {
    daysHTML += `<div class="cal-day empty"></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
    const hasDue = !!dueMap[d];
    const classes = ['cal-day'];
    if (isToday) classes.push('today');
    if (hasDue) classes.push('has-due');
    daysHTML += `<div class="${classes.join(' ')}">${d}</div>`;
  }

  // Events list for this month
  let eventsHTML = '';
  const sortedDays = Object.keys(dueMap).map(Number).sort((a,b) => a - b);
  sortedDays.forEach(day => {
    if (day > daysInMonth) return;
    dueMap[day].forEach(ev => {
      const isPast = new Date(calYear, calMonth, day) < today;
      eventsHTML += `
        <div class="cal-event">
          <div class="cal-event-dot" style="background:${ev.color}"></div>
          <div class="cal-event-info">
            <div class="cal-event-name">${ev.creditor}</div>
            <div class="cal-event-sub">${ev.label} · ${getOrdinal(day)} ${isPast ? '(past)' : ''}</div>
          </div>
          <div class="cal-event-amount" style="color:${ev.color}">${formatCurrency(ev.amount)}</div>
        </div>
      `;
    });
  });

  container.innerHTML = `
    <div class="calendar-month">
      <div class="cal-header">
        <div class="cal-month-name">${monthName}</div>
        <div class="cal-nav">
          <button onclick="changeMonth(-1)">‹</button>
          <button onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="cal-grid">${daysHTML}</div>
      ${eventsHTML ? `<div class="cal-events">${eventsHTML}</div>` : ''}
    </div>
  `;
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

// ═══════════════════════════════════════════════════
// RENDER: STATS
// ═══════════════════════════════════════════════════
function renderStats() {
  const container = document.getElementById('stats-container');

  let totalPrincipal = 0, totalMonthly = 0, totalPaid = 0, totalRemaining = 0;
  const creditorData = [];

  appData.creditors.forEach(c => {
    let cMonthly = 0, cPaid = 0, cTotal = 0;
    c.loans.forEach(l => {
      if (l.principal) totalPrincipal += l.principal;
      const paid = l.monthsPaid * l.monthly;
      const total = l.totalMonths * l.monthly;
      totalPaid += paid;
      totalRemaining += (total - paid);
      cPaid += paid;
      cTotal += total;
      if (!(l.totalMonths > 0 && l.monthsPaid >= l.totalMonths)) {
        cMonthly += l.monthly || 0;
        totalMonthly += l.monthly || 0;
      }
    });
    creditorData.push({ name: c.name, color: c.color, monthly: cMonthly, paid: cPaid, total: cTotal });
  });

  // Monthly breakdown bars
  let barsHTML = '';
  creditorData.sort((a,b) => b.monthly - a.monthly).forEach(c => {
    if (c.monthly <= 0) return;
    const pct = totalMonthly > 0 ? (c.monthly / totalMonthly * 100) : 0;
    barsHTML += `
      <div class="stat-bar-row">
        <div class="stat-bar-label">${c.name}</div>
        <div class="stat-bar-track">
          <div class="stat-bar-fill" style="width:${pct}%;background:${c.color}"></div>
        </div>
        <div class="stat-bar-value" style="color:${c.color}">${formatCurrency(c.monthly)}</div>
      </div>
    `;
  });

  container.innerHTML = `
    <div class="stat-section">
      <h3>Portfolio Overview</h3>
      <div class="stat-card">
        <div class="sc-row">
          <span class="sc-label">Total Principal Borrowed</span>
          <span class="sc-value">${formatCurrency(totalPrincipal)}</span>
        </div>
        <div class="sc-row">
          <span class="sc-label">Total Amount Paid</span>
          <span class="sc-value text-success">${formatCurrency(totalPaid)}</span>
        </div>
        <div class="sc-row">
          <span class="sc-label">Total Remaining</span>
          <span class="sc-value text-warning">${formatCurrency(totalRemaining)}</span>
        </div>
        <div class="sc-row">
          <span class="sc-label">Monthly Obligation</span>
          <span class="sc-value text-accent">${formatCurrency(totalMonthly)}</span>
        </div>
      </div>
    </div>

    <div class="stat-section">
      <h3>Monthly Breakdown by Creditor</h3>
      ${barsHTML}
    </div>

    <div class="stat-section">
      <h3>Debt-Free Timeline</h3>
      <div class="stat-card">
        ${creditorData.filter(c => c.total > 0).sort((a,b) => {
          const aRem = a.total - a.paid;
          const bRem = b.total - b.paid;
          const aMos = a.monthly > 0 ? Math.ceil(aRem / a.monthly) : 999;
          const bMos = b.monthly > 0 ? Math.ceil(bRem / b.monthly) : 999;
          return aMos - bMos;
        }).map(c => {
          const rem = c.total - c.paid;
          const mosLeft = c.monthly > 0 ? Math.ceil(rem / c.monthly) : 0;
          const doneDate = new Date();
          doneDate.setMonth(doneDate.getMonth() + mosLeft);
          return `<div class="sc-row">
            <span class="sc-label">${c.name}</span>
            <span class="sc-value">${mosLeft > 0 ? doneDate.toLocaleDateString('en-PH', {month:'short', year:'numeric'}) : '<span class="text-success">Paid!</span>'}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════
function recordPayment(creditorId, loanId) {
  const c = appData.creditors.find(x => x.id === creditorId);
  if (!c) return;
  const l = c.loans.find(x => x.id === loanId);
  if (!l) return;
  if (l.monthsPaid < l.totalMonths) {
    l.monthsPaid++;
    saveData(appData);
    renderAll();
    showToast(`✓ Payment recorded for ${c.name} — ${l.label}`);
  }
}

function editLoan(creditorId, loanId) {
  const c = appData.creditors.find(x => x.id === creditorId);
  const l = c.loans.find(x => x.id === loanId);
  const remaining = (l.duration || 0) - (l.monthsPaid || 0);
  openModal(`
    <div class="modal-handle"></div>
    <h3>Edit: ${c.name} — ${l.label}</h3>
    <div class="form-group">
      <label>Label</label>
      <input id="el-label" value="${l.label}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Principal</label>
        <input id="el-principal" type="number" value="${l.principal || ''}">
      </div>
      <div class="form-group">
        <label>Monthly Amort.</label>
        <input id="el-monthly" type="number" value="${l.monthly || ''}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Availment Date</label>
        <input id="el-avail" type="date" value="${l.availDate}">
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input id="el-end" type="date" value="${l.endDate}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Due Day</label>
        <input id="el-dueday" type="number" min="1" max="31" value="${l.dueDay}">
      </div>
      <div class="form-group">
        <label>Duration (months)</label>
        <input id="el-duration" type="number" value="${l.duration || ''}" oninput="calcRemaining()">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Total Months Paid</label>
        <input id="el-paid" type="number" value="${l.monthsPaid}" oninput="calcRemaining()">
      </div>
      <div class="form-group">
        <label>Remaining Months to Pay</label>
        <input id="el-remaining" type="text" value="${remaining >= 0 ? remaining : 0}" readonly style="opacity:0.6;cursor:not-allowed;">
      </div>
    </div>
    <button class="btn btn-primary" onclick="applyLoanEdit('${c.id}','${l.id}')">Apply</button>
    <button class="btn btn-primary" style="background:var(--success);margin-top:8px;" onclick="saveLoanEdit('${c.id}','${l.id}')">Save & Close</button>
    <button class="btn btn-danger" onclick="deleteLoan('${c.id}','${l.id}')">Delete Loan</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
  `);
}

function calcRemaining() {
  const dur = parseInt(document.getElementById('el-duration').value) || 0;
  const paid = parseInt(document.getElementById('el-paid').value) || 0;
  const rem = Math.max(0, dur - paid);
  document.getElementById('el-remaining').value = rem;
}

function applyLoanEdit(cid, lid) {
  const c = appData.creditors.find(x => x.id === cid);
  const l = c.loans.find(x => x.id === lid);
  l.label = document.getElementById('el-label').value || l.label;
  l.principal = parseFloat(document.getElementById('el-principal').value) || null;
  l.monthly = parseFloat(document.getElementById('el-monthly').value) || 0;
  l.availDate = document.getElementById('el-avail').value || '';
  l.endDate = document.getElementById('el-end').value || '';
  l.dueDay = parseInt(document.getElementById('el-dueday').value) || 1;
  l.duration = parseInt(document.getElementById('el-duration').value) || null;
  l.monthsPaid = parseInt(document.getElementById('el-paid').value) || 0;
  l.totalMonths = l.duration || 0;
  saveData(appData);
  renderAll();
  showToast('✓ Changes applied');
}

function saveLoanEdit(cid, lid) {
  applyLoanEdit(cid, lid);
  closeModal();
  showToast('✓ Loan saved & closed');
}

function deleteLoan(cid, lid) {
  if (!confirm('Delete this loan?')) return;
  const c = appData.creditors.find(x => x.id === cid);
  c.loans = c.loans.filter(x => x.id !== lid);
  if (c.loans.length === 0) {
    appData.creditors = appData.creditors.filter(x => x.id !== cid);
  }
  saveData(appData);
  closeModal();
  renderAll();
  showToast('Loan deleted');
}

function openAddLoan(cid) {

    <div class="form-group">
      <label>Label</label>

        <label>Principal</label>
        <input id="al-principal" type="number" placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Monthly Amort.</label>
        <input id="al-monthly" type="number" placeholder="0.00">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Availment Date</label>
        <input id="al-avail" type="date">
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input id="al-end" type="date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Due Day</label>
        <input id="al-dueday" type="number" min="1" max="31" placeholder="1">

function calcRemainingAdd() {
  const dur = parseInt(document.getElementById('al-duration').value) || 0;
  const paid = parseInt(document.getElementById('al-paid').value) || 0;
  document.getElementById('al-remaining').value = Math.max(0, dur - paid);
}

function saveNewLoan(cid) {
  const c = appData.creditors.find(x => x.id === cid);
  const id = cid + '_' + Date.now();
  const dur = parseInt(document.getElementById('al-duration').value) || null;
  const paid = parseInt(document.getElementById('al-paid').value) || 0;
  c.loans.push({
    id,
    label: document.getElementById('al-label').value || 'New Loan',
    principal: parseFloat(document.getElementById('al-principal').value) || null,
    monthly: parseFloat(document.getElementById('al-monthly').value) || 0,
    availDate: document.getElementById('al-avail').value || '',
    endDate: document.getElementById('al-end').value || '',
    dueDay: parseInt(document.getElementById('al-dueday').value) || 1,
    duration: dur,
    totalMonths: dur || 0,
    monthsPaid: paid,
  });
  saveData(appData);
  closeModal();
  renderAll();
  showToast('✓ Loan added');
}

function openAddCreditor() {
  const icons = ['🏦','🏛️','💳','📱','🔴','📦','🟡','💰','🏧','🏢'];
  const colors = ['#f5c518','#3b82f6','#ff6348','#a55eea','#ff4757','#2ed573','#ffa502','#1e90ff','#ff6b81','#7bed9f'];
  openModal(`

    <h3>Add New Creditor</h3>

    </div>
    <div class="form-group">
      <label>Account Number (optional)</label>

    <div class="form-row">
      <div class="form-group">

        <select id="ac-icon">${icons.map(i => `<option value="${i}">${i}</option>`).join('')}</select>

function saveNewCreditor() {
  const name = document.getElementById('ac-name').value;
  if (!name) { showToast('Please enter a name'); return; }
  const id = 'c_' + Date.now();
  appData.creditors.push({
    id,
    name,
    account: document.getElementById('ac-account').value || '',
    icon: document.getElementById('ac-icon').value || '🏦',

  });

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ═══════════════════════════════════════════════════
// DATA MANAGEMENT
// ═══════════════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `loanpilot_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 Data exported');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.creditors) {
        appData = data;
        saveData(appData);
        renderAll();
        showToast('📥 Data imported successfully');
      } else {
        showToast('Invalid file format');
      }
    } catch(err) {
      showToast('Error reading file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function confirmReset() {
  openModal(`
    <div class="modal-handle"></div>
    <h3>⚠️ Reset All Data</h3>
    <p style="color:var(--text-secondary);margin-bottom:16px;font-size:14px;line-height:1.6;">This will delete all creditors and loans and restore the default data. This action cannot be undone. Export your data first if you want a backup.</p>
    <button class="btn btn-danger" onclick="resetData()" style="margin-top:0;">Yes, Reset Everything</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
  `);
}

function resetData() {
  localStorage.removeItem(STORAGE_KEY);
  appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveData(appData);
  closeModal();
  renderAll();
  showToast('Data reset to defaults');
}

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

    document.getElementById('view-' + btn.dataset.view).classList.add('active');

    if (btn.dataset.view === 'calendar') renderCalendar();
    if (btn.dataset.view === 'stats') renderStats();
  });
});

// ═══════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════
function renderAll() {
  renderHome();
  // Re-render active views
  const activeView = document.querySelector('.nav-item.active')?.dataset.view;
  if (activeView === 'calendar') renderCalendar();
  if (activeView === 'stats') renderStats();
}

renderAll();
